<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300..700&amp;family=JetBrains+Mono:wght@400;500&amp;display=swap" rel="stylesheet">
<style>
@font-face{font-family:'D2Coding';font-weight:400;font-style:normal;font-display:swap;src:url('https://cdn.jsdelivr.net/gh/fonts-archive/D2Coding/D2Coding-Regular.woff2') format('woff2'),url('https://cdn.jsdelivr.net/gh/fonts-archive/D2Coding/D2Coding-Regular.woff') format('woff');}
@font-face{font-family:'D2Coding';font-weight:700;font-style:normal;font-display:swap;src:url('https://cdn.jsdelivr.net/gh/fonts-archive/D2Coding/D2Coding-Bold.woff2') format('woff2'),url('https://cdn.jsdelivr.net/gh/fonts-archive/D2Coding/D2Coding-Bold.woff') format('woff');}
*{box-sizing:border-box;}
html,body{margin:0;height:100%;}
body{font-family:Inter,"D2Coding","SF Pro Display",system-ui,helvetica,"Apple Color Emoji","Segoe UI Emoji",sans-serif;color:#000;background:#fff;-webkit-font-smoothing:antialiased;font-feature-settings:'kern' 1;word-break:keep-all;}
button{font-family:inherit;}
input,textarea,select{font-family:inherit;}
.ae{font-family:"Apple Color Emoji","Segoe UI Emoji","Noto Color Emoji",sans-serif;}
::-webkit-scrollbar{height:10px;width:10px}
::-webkit-scrollbar-thumb{background:#e6e6e6;border-radius:9px}
::-webkit-scrollbar-track{background:transparent}
@keyframes toastIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
@media (max-width:820px){
  .app-shell{flex-direction:column!important}
  .app-sidebar{width:auto!important;height:auto!important;border-right:none!important;border-bottom:1px solid #e6e6e6!important;padding:8px 12px!important;flex-direction:row!important;align-items:center;gap:10px;overflow-x:auto}
  .sb-nav{flex-direction:row!important;gap:4px!important;flex:1}
  .sb-brand{margin:0 8px 0 0!important}
  .sb-foot{display:none!important}
  .sb-nav button span{display:none!important}
}
@media (max-width:600px){
  .app-head{padding:14px 16px!important;flex-wrap:wrap!important;gap:10px!important;}
  .head-actions{margin-left:auto!important;}
  [style*="padding:22px 28px"]{padding-left:16px!important;padding-right:16px!important;}
  [style*="padding:24px 28px"]{padding-left:16px!important;padding-right:16px!important;}
}
@media (max-width:440px){
  .streak-chip{display:none!important;}
  .sb-brand div{display:none!important;}
}
</style>
</helmet>
<div class="app-shell" style="display:flex;height:100vh;width:100%;background:#fff;">
  <aside class="app-sidebar" style="width:248px;flex:none;height:100vh;background:#fff;border-right:1px solid #e6e6e6;display:flex;flex-direction:column;padding:18px 14px;">
    <div class="sb-brand" style="display:flex;align-items:center;gap:9px;padding:4px 8px 18px;">
      <span class="ae" style="font-size:22px;line-height:1;">🎸</span>
      <div style="font-weight:540;font-size:18px;letter-spacing:-0.4px;">코드살롱</div>
    </div>
    <nav class="sb-nav" style="display:flex;flex-direction:column;gap:2px;">
      <sc-for list="{{ navItems }}" as="item" hint-placeholder-count="5">
        <button onClick="{{ item.onClick }}" style="{{ item.style }}">
          <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="{{ item.iconColor }}" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" style="flex:none;"><path d="{{ item.iconPath }}"></path></svg>
          <span style="white-space:nowrap;">{{ item.label }}</span>
        </button>
      </sc-for>
    </nav>
    <div class="sb-foot" style="margin-top:auto;padding:14px 8px 2px;border-top:1px solid #e6e6e6;">
      <div style="display:flex;gap:5px;margin-bottom:14px;">
        <button onClick="{{ langKo.onClick }}" style="{{ langKo.style }}">KO</button>
        <button onClick="{{ langEn.onClick }}" style="{{ langEn.style }}">EN</button>
      </div>
      <div style="font-family:'JetBrains Mono','D2Coding',monospace;font-size:11px;color:#000;margin-bottom:8px;letter-spacing:0.6px;text-transform:uppercase;">{{ thisWeekLabel }}</div>
      <div style="display:flex;align-items:baseline;gap:6px;">
        <span style="font-size:30px;font-weight:340;letter-spacing:-0.8px;">{{ weekCount }}</span>
        <span style="font-family:'JetBrains Mono','D2Coding',monospace;font-size:12px;color:#000;">{{ weekMeta }}</span>
      </div>
    </div>
  </aside>

  <main class="app-main" style="flex:1;min-width:0;display:flex;flex-direction:column;height:100vh;">
    <header class="app-head" style="flex:none;display:flex;align-items:flex-end;justify-content:space-between;gap:16px;padding:18px 28px;border-bottom:1px solid #e6e6e6;">
      <div style="min-width:0;">
        <div style="font-family:'JetBrains Mono','D2Coding',monospace;font-size:12px;letter-spacing:0.6px;text-transform:uppercase;color:#000;margin-bottom:6px;">{{ viewEyebrow }}</div>
        <div style="font-size:26px;font-weight:540;letter-spacing:-0.4px;line-height:1.1;white-space:nowrap;">{{ viewTitle }}</div>
      </div>
      <div class="head-actions" style="display:flex;align-items:center;gap:10px;flex:none;">
        <div class="streak-chip" style="display:flex;align-items:center;gap:7px;padding:7px 14px;background:#fff;border:1px solid #e6e6e6;border-radius:50px;font-family:'JetBrains Mono','D2Coding',monospace;font-size:12px;letter-spacing:0.4px;color:#000;white-space:nowrap;flex:none;">
          <span class="ae">🔥</span>{{ streakChip }}
        </div>
        <button onClick="{{ logPractice }}" style="{{ primaryBtnStyle }}">{{ headerLogBtn }}</button>
      </div>
    </header>

    <div style="flex:1;min-height:0;overflow-y:auto;">
      <sc-if value="{{ isHome }}" hint-placeholder-val="{{ true }}">
        <div style="padding:24px 28px 56px;">
          <div style="display:inline-flex;background:#f7f7f5;border-radius:50px;padding:4px;gap:2px;margin-bottom:22px;">
            <sc-for list="{{ homeLayouts }}" as="item" hint-placeholder-count="3">
              <button onClick="{{ item.onClick }}" style="{{ item.style }}">{{ item.label }}</button>
            </sc-for>
          </div>
          {{ homeView }}
        </div>
      </sc-if>

      <sc-if value="{{ isDict }}" hint-placeholder-val="{{ true }}">
        <div style="padding:22px 28px 56px;">
          <div style="display:flex;flex-wrap:wrap;align-items:center;gap:12px;margin-bottom:16px;">
            <div style="display:inline-flex;background:#f7f7f5;border-radius:50px;padding:4px;gap:2px;">
              <sc-for list="{{ dictModes }}" as="item" hint-placeholder-count="2">
                <button onClick="{{ item.onClick }}" style="{{ item.style }}">{{ item.label }}</button>
              </sc-for>
            </div>
            <sc-if value="{{ isKeyMode }}" hint-placeholder-val="{{ true }}">
              <div style="display:inline-flex;background:#f7f7f5;border-radius:50px;padding:4px;gap:2px;">
                <sc-for list="{{ keyTypeTabs }}" as="item" hint-placeholder-count="2">
                  <button onClick="{{ item.onClick }}" style="{{ item.style }}">{{ item.label }}</button>
                </sc-for>
              </div>
            </sc-if>
            <div style="position:relative;margin-left:auto;">
              <input value="{{ query }}" onInput="{{ onSearch }}" placeholder="{{ searchPlaceholder }}" style="width:210px;padding:9px 12px 9px 32px;font-size:15px;border:1px solid #e6e6e6;border-radius:8px;background:#fff;outline:none;color:#000;">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#000" stroke-width="2" style="position:absolute;left:11px;top:11px;"><circle cx="11" cy="11" r="7"></circle><path d="m20 20-3-3"></path></svg>
            </div>
          </div>
          <div style="display:flex;flex-wrap:wrap;gap:5px;margin-bottom:22px;">
            <sc-for list="{{ rootButtons }}" as="item" hint-placeholder-count="12">
              <button onClick="{{ item.onClick }}" style="{{ item.style }}">{{ item.name }}</button>
            </sc-for>
          </div>
          {{ chordGrid }}
        </div>
      </sc-if>

      <sc-if value="{{ isScales }}" hint-placeholder-val="{{ true }}">
        <div style="padding:22px 28px 56px;">
          <div style="display:flex;flex-wrap:wrap;align-items:center;gap:12px;margin-bottom:16px;">
            <div style="display:inline-flex;background:#f7f7f5;border-radius:50px;padding:4px;gap:2px;flex-wrap:wrap;">
              <sc-for list="{{ scaleTabs }}" as="item" hint-placeholder-count="5">
                <button onClick="{{ item.onClick }}" style="{{ item.style }}">{{ item.label }}</button>
              </sc-for>
            </div>
          </div>
          <div style="display:flex;flex-wrap:wrap;gap:5px;margin-bottom:22px;">
            <sc-for list="{{ rootButtons }}" as="item" hint-placeholder-count="12">
              <button onClick="{{ item.onClick }}" style="{{ item.style }}">{{ item.name }}</button>
            </sc-for>
          </div>
          {{ scaleView }}
        </div>
      </sc-if>

      <sc-if value="{{ isBuilder }}" hint-placeholder-val="{{ true }}">
        <div style="padding:22px 28px 56px;">{{ builderView }}</div>
      </sc-if>

      <sc-if value="{{ isPractice }}" hint-placeholder-val="{{ true }}">
        <div style="padding:22px 28px 56px;">{{ practiceView }}</div>
      </sc-if>

      <sc-if value="{{ isLesson }}" hint-placeholder-val="{{ true }}">
        <div style="padding:22px 28px 56px;">{{ lessonView }}</div>
      </sc-if>
    </div>
  </main>

  <sc-if value="{{ isDetail }}" hint-placeholder-val="">
    {{ detailView }}
  </sc-if>

  <sc-if value="{{ toast }}" hint-placeholder-val="">
    <div style="position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#000;color:#fff;padding:11px 20px;border-radius:50px;font-size:16px;font-weight:480;box-shadow:0 8px 28px rgba(0,0,0,.22);animation:toastIn .22s ease;z-index:50;">{{ toast }}</div>
  </sc-if>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:&quot;100%&quot;,&quot;height&quot;:&quot;100%&quot;},&quot;accentColor&quot;:{&quot;editor&quot;:&quot;color&quot;,&quot;default&quot;:&quot;#0052cc&quot;,&quot;options&quot;:[&quot;#000000&quot;,&quot;#ff3d8b&quot;,&quot;#1f1d3d&quot;],&quot;tsType&quot;:&quot;string&quot;},&quot;homeLayout&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;default&quot;:&quot;focus&quot;,&quot;options&quot;:[&quot;focus&quot;,&quot;board&quot;,&quot;minimal&quot;],&quot;tsType&quot;:&quot;string&quot;},&quot;cardSize&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;default&quot;:&quot;md&quot;,&quot;options&quot;:[&quot;sm&quot;,&quot;md&quot;,&quot;lg&quot;],&quot;tsType&quot;:&quot;string&quot;}}">

  INTERVALS = {maj:[0,4,7],min:[0,3,7],dim:[0,3,6],aug:[0,4,8],sus2:[0,2,7],sus4:[0,5,7],majb5:[0,4,6],'m#5':[0,3,8],mbb5:[0,3,5],'sus4#5':[0,5,8],sus2b5:[0,2,6],'sus2#5':[0,2,8],'7':[0,4,7,10],m7:[0,3,7,10],maj7:[0,4,7,11],mMaj7:[0,3,7,11],dim7:[0,3,6,9],aug7:[0,4,8,10],augMaj7:[0,4,8,11],'7b5':[0,4,6,10],maj7b5:[0,4,6,11],m7b5:[0,3,6,10],mMaj7b5:[0,3,6,11],mMaj7bb5:[0,3,5,11],'m7#5':[0,3,8,10],'mMaj7#5':[0,3,8,11],'7b9':[0,4,7,10,13],'6':[0,4,7,9],m6:[0,3,7,9],'6b5':[0,4,6,9],'6add9':[0,4,7,9,14],m6add9:[0,3,7,9,14],'9':[0,4,7,10,14],m9:[0,3,7,10,14],maj9:[0,4,7,11,14],mMaj9:[0,3,7,11,14],'9b5':[0,4,6,10,14],aug9:[0,4,8,10,14],'9sus4':[0,5,7,10,14],'7#9':[0,4,7,10,15],'7#9b5':[0,4,6,10,15],augMaj9:[0,4,8,11,14],add9:[0,4,7,14],'11':[0,7,10,14,17],m11:[0,3,7,10,14,17],maj11:[0,4,7,11,14,17],mMaj11:[0,3,7,11,14,17],'maj#11':[0,4,7,11,14,18],'13':[0,4,7,10,14,17,21],m13:[0,3,7,10,14,17,21],maj13:[0,4,7,11,14,17,21],mMaj13:[0,3,7,11,14,21],'7sus2':[0,2,7,10],maj7sus2:[0,2,7,11],'7sus4':[0,5,7,10],maj7sus4:[0,5,7,11],'7sus2#5':[0,2,8,10],'7sus4#5':[0,5,8,10]};

  componentDidMount(){

  seedExampleSheet(){
    if(this.state.sequence.some(Boolean)) return;
    const prog=[['C','maj'],['G','maj'],['A','min'],['E','min'],['F','maj'],['C','maj'],['F','maj'],['G','maj']];
    const seq=prog.map(([n,q])=>{ const ni=this.NOTE.indexOf(n); const ch=this.buildChord(ni,q); return {name:ch.name,frets:ch.frets}; });

    this.setState({grass,journal,collected,sheets,drills,lessons});

    return h('div',{style:{maxWidth:760}},
      form,
      h('div',{style:{display:'flex',alignItems:'center',gap:10,marginBottom:18}},
        h('h2',{style:{fontSize:26,fontWeight:540,letterSpacing:'-0.26px',margin:0}},'레슨 히스토리'),
        h('span',{style:{fontFamily:'"JetBrains Mono","D2Coding",monospace',fontSize:12,letterSpacing:'0.6px',color:'#000'}},'('+s.lessons.length+')')),
      h('div',{style:{display:'flex',flexDirection:'column',gap:14}},list));
  }
  lessonCard(l){ const h=React.createElement,C=this.colors();
    const hw=(l.homework||'').split(/\n/).map(x=>x.trim()).filter(Boolean);
    return h('div',{key:l.id,style:{background:'#fff',border:'1px solid '+C.border,borderRadius:24,padding:'24px 26px'}},
      h('div',{style:{display:'flex',alignItems:'center',gap:10,flexWrap:'wrap',marginBottom:12}},
        h('span',{style:{fontFamily:'"JetBrains Mono","D2Coding",monospace',fontSize:12,letterSpacing:'0.6px',color:'#000'}},l.date),
        l.teacher?h('span',{style:{fontFamily:'"JetBrains Mono","D2Coding",monospace',fontSize:12,letterSpacing:'0.6px',textTransform:'uppercase',color:'#000',background:'#e4d8f8',borderRadius:6,padding:'3px 9px'}},'🎓 '+l.teacher):null,
        h('span',{style:{marginLeft:'auto',fontFamily:'"JetBrains Mono","D2Coding",monospace',fontSize:12,color:'#000',border:'1px solid '+C.border,borderRadius:50,padding:'4px 12px'}},l.minutes+'분'),
        h('button',{onClick:()=>this.deleteLesson(l.id),title:'삭제',style:{width:34,height:34,borderRadius:9999,border:'none',background:C.panel,color:'#000',cursor:'pointer',fontSize:17,lineHeight:1,flex:'none'}},'\u00d7')),
      h('div',{style:{fontSize:24,fontWeight:700,lineHeight:1.3,marginBottom:(hw.length||l.notes)?14:0}},l.title),
      hw.length?h('div',{style:{background:'#f7f1e2',borderRadius:16,padding:'16px 18px',marginBottom:l.notes?12:0}},
        h('div',{style:{display:'flex',alignItems:'center',justifyContent:'space-between',gap:10,marginBottom:10,flexWrap:'wrap'}},
          h('span',{style:{fontFamily:'"JetBrains Mono","D2Coding",monospace',fontSize:12,letterSpacing:'0.6px',textTransform:'uppercase'}},'📝 이번 주 숙제'),
          h('button',{onClick:()=>this.homeworkToDrills(l),style:{padding:'6px 14px',fontSize:14,fontWeight:480,border:'none',borderRadius:50,background:'#000',color:'#fff',cursor:'pointer'}},'연습 목록에 담기')),
        h('div',{style:{display:'flex',flexDirection:'column',gap:6}},hw.map((x,i)=>h('div',{key:i,style:{fontSize:18,fontWeight:330,display:'flex',gap:8}},h('span',{},'•'),h('span',{},x))))):null,
      l.notes?h('div',{style:{fontSize:18,fontWeight:330,lineHeight:1.5,color:'#000',whiteSpace:'pre-wrap'}},l.notes):null);
  }

  // ---------- home view ----------
  homeView(){ const h=React.createElement,C=this.colors(),s=this.state,st=this.stats();
    const layout=s.homeLayout||this.props.homeLayout||'focus';
    const suggested=['C|maj','G|maj','A|min','F|maj','D|min','E|min'].map(k=>{const[r,q]=k.split('|');return this.buildChord(this.NOTE.indexOf(r),q);});
    const recent=s.journal.slice(0,3);
    const grassCard=(cs)=>h('div',{style:{border:'1px solid '+C.border,borderRadius:16,background:'#fff',padding:'18px 20px'}},
      h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:14,flexWrap:'wrap',gap:8}},h('div',{style:{fontSize:13.5,fontWeight:640,whiteSpace:'nowrap'}},'연습 잔디'),h('div',{style:{fontSize:12,color:C.faint}},st.total+'회 누적')),
      this.grassEl(cs),h('div',{style:{marginTop:9}},this.legendEl()));
    const recentList=h('div',{style:{display:'flex',flexDirection:'column',gap:9}},recent.length?recent.map(j=>h('div',{key:j.id,style:{display:'flex',gap:10,alignItems:'baseline'}},h('span',{style:{fontFamily:'"JetBrains Mono","D2Coding",ui-monospace,monospace',fontSize:11,color:C.faint,flex:'none'}},j.date.slice(5)),h('span',{style:{fontSize:13.5,color:C.ink,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}},j.title))):h('span',{style:{fontSize:13,color:C.faint}},'아직 일지가 없어요'));
    const suggestRow=h('div',{style:{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(118px,1fr))',gap:12}},suggested.map(c=>h('div',{key:c.name,style:{border:'1px solid '+C.border,borderRadius:10,background:'#fff',padding:'10px 8px 8px',display:'flex',flexDirection:'column',alignItems:'center',gap:5}},h('span',{style:{fontWeight:620,fontSize:14}},c.name),this.diagramEl(c.frets,82),h('button',{onClick:()=>this.playChord(c.frets),style:{fontSize:11,color:C.muted,background:C.panel,border:'1px solid '+C.border,borderRadius:6,padding:'3px 10px',cursor:'pointer'}},'▶ 듣기'))));

    if(layout==='focus'){
      return h('div',{style:{display:'flex',flexDirection:'column',gap:24,maxWidth:920}},
        h('div',{style:{display:'flex',gap:18,flexWrap:'wrap',alignItems:'stretch'}},
          h('div',{style:{flex:'1 1 280px',background:'#e8f2d2',color:'#000',borderRadius:24,padding:'30px 32px',display:'flex',flexDirection:'column',justifyContent:'space-between',minHeight:172}},
            h('div',{},h('div',{style:{fontFamily:'"JetBrains Mono","D2Coding",monospace',fontSize:12,letterSpacing:'0.6px',textTransform:'uppercase',opacity:.6}},'🔥 STREAK'),h('div',{style:{fontSize:56,fontWeight:340,letterSpacing:'-1.4px',lineHeight:1.0,marginTop:8}},st.streak,h('span',{style:{fontSize:22,fontWeight:330,opacity:.6,marginLeft:8}},'일째')) ),
            h('button',{onClick:()=>this.logPractice(),style:{alignSelf:'flex-start',marginTop:18,padding:'10px 22px',fontSize:16,fontWeight:480,letterSpacing:'-0.1px',border:'none',borderRadius:50,background:'#000',color:'#fff',cursor:'pointer',whiteSpace:'nowrap'}},'오늘 연습 기록하기')),
          grassCard(11)),
        h('div',{},h('div',{style:{fontSize:14,fontWeight:640,marginBottom:13}},'오늘의 추천 코드'),suggestRow));
    }
    if(layout==='board'){
      const card=(title,body,span)=>h('div',{style:{gridColumn:span?'1 / -1':'auto',border:'1px solid '+C.border,borderRadius:16,background:'#fff',padding:'18px 20px'}},h('div',{style:{fontSize:13.5,fontWeight:640,marginBottom:13}},title),body);
      return h('div',{style:{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(280px,1fr))',gap:16,maxWidth:1000}},
        card('연습 잔디',h('div',{},this.grassEl(10),h('div',{style:{marginTop:9}},this.legendEl())),true),
        h('div',{style:{border:'1px solid '+C.border,borderRadius:16,background:'#fff',padding:'18px 20px',display:'flex',flexDirection:'column',justifyContent:'center'}},h('div',{style:{fontSize:13,color:C.faint,marginBottom:4}},'연속 연습'),h('div',{style:{fontSize:38,fontWeight:720,letterSpacing:'-0.02em'}},st.streak+'일'),h('button',{onClick:()=>this.logPractice(),style:{marginTop:14,padding:'9px 14px',fontSize:13,fontWeight:600,border:'none',borderRadius:8,background:C.accent,color:'#fff',cursor:'pointer'}},'＋ 오늘 기록')),
        card('최근 일지',recentList),
        card('담은 코드 ('+s.collected.length+')',h('div',{},h('div',{style:{display:'flex',gap:6,flexWrap:'wrap',marginBottom:12}},s.collected.slice(0,8).map((c,i)=>h('span',{key:i,style:{fontFamily:'"JetBrains Mono","D2Coding",ui-monospace,monospace',fontSize:12.5,fontWeight:600,background:C.soft,color:C.ink,borderRadius:7,padding:'4px 10px'}},c.name))),h('button',{onClick:()=>this.setView('builder'),style:{fontSize:12.5,border:'1px solid '+C.border,borderRadius:7,background:'#fff',padding:'7px 13px',cursor:'pointer',color:C.ink}},'악보 만들기 →'))));
    }
    // minimal
    return h('div',{style:{maxWidth:580,margin:'0 auto',display:'flex',flexDirection:'column',gap:22}},
      h('div',{style:{textAlign:'center'}},h('div',{style:{fontSize:13,color:C.faint}},'연속 연습'),h('div',{style:{fontSize:40,fontWeight:720,letterSpacing:'-0.02em'}},st.streak+'일'),h('button',{onClick:()=>this.logPractice(),style:{marginTop:12,padding:'10px 18px',fontSize:13.5,fontWeight:600,border:'none',borderRadius:9,background:C.accent,color:'#fff',cursor:'pointer'}},'＋ 오늘 연습 기록')),
      h('div',{style:{border:'1px solid '+C.border,borderRadius:16,background:'#fff',padding:'16px 18px'}},this.grassEl(9),h('div',{style:{marginTop:9}},this.legendEl())),
      h('div',{},h('div',{style:{fontSize:13,fontWeight:640,marginBottom:11,color:C.muted}},'최근 일지'),recentList));
  }

  // ---------- segmented styles ----------
  seg(active){ const C=this.colors(); return {padding:'8px 16px',fontSize:14,border:'none',borderRadius:50,cursor:'pointer',background:active?C.ink:'transparent',color:active?'#fff':C.ink,fontWeight:active?540:480,letterSpacing:'-0.1px',boxShadow:'none',whiteSpace:'nowrap',transition:'all .12s'}; }
  pill(active){ const C=this.colors(); return {minWidth:40,padding:'8px 0',fontSize:14,fontWeight:active?540:480,border:'1px solid '+(active?C.ink:C.border),borderRadius:50,cursor:'pointer',background:active?C.ink:'#fff',color:active?'#fff':C.ink,fontFamily:'"JetBrains Mono","D2Coding",ui-monospace,monospace',transition:'all .12s'}; }
  langBtnStyle(active){ const C=this.colors(); return {flex:1,padding:'6px 0',fontSize:11,fontWeight:active?700:500,letterSpacing:'0.5px',border:'1px solid '+(active?C.ink:C.border),borderRadius:7,cursor:'pointer',background:active?C.ink:'#fff',color:active?'#fff':C.muted,fontFamily:'"JetBrains Mono",ui-monospace,monospace'}; }

  renderVals(){
    const s=this.state, C=this.colors();
    const st=this.stats();
    const navDefs=[
      {key:'home',label:this.L('홈','Home'),icon:'M3 9.5 12 3l9 6.5V21H3z'},
      {key:'dictionary',label:this.L('코드 사전','Chords'),icon:'M5 4h12a2 2 0 0 1 2 2v15H7a2 2 0 0 1-2-2zM5 4v13'},
      {key:'scales',label:this.L('스케일','Scales'),icon:'M4 7h16M4 12h16M4 17h16'},
      {key:'builder',label:this.L('악보 만들기','Sheet'),icon:'M9 18a3 3 0 1 0-6 0 3 3 0 0 0 6 0zM9 18V5l11-2v11M20 14a3 3 0 1 0-6 0 3 3 0 0 0 6 0z'},
      {key:'practice',label:this.L('연습 기록','Practice'),icon:'M4 5h16v16H4zM4 9h16M9 3v4M15 3v4M8 14h2M14 14h2'},
      {key:'lesson',label:this.L('레슨 기록','Lessons'),icon:'M22 10 12 5 2 10l10 5 10-5zM6 12v5c0 2 3 3 6 3s6-1 6-3v-5'}
    ];
    const navItems=navDefs.map(n=>{ const a=s.view===n.key; return {label:n.label,iconPath:n.icon,iconColor:a?'#fff':C.faint,onClick:()=>this.setView(n.key),
      style:{display:'flex',alignItems:'center',gap:10,padding:'9px 12px',borderRadius:8,border:'none',cursor:'pointer',fontSize:14,textAlign:'left',width:'100%',background:a?C.ink:'transparent',color:a?'#fff':C.ink,fontWeight:a?540:480}}; });

    const titles=this.lang()==='en'?{home:['Home','Welcome back — ready to practice today?','🏠 OVERVIEW'],dictionary:['Chord Dictionary','Find, hear and collect chord diagrams by key and root','📖 CHORD LIBRARY'],scales:['Scales','Learn scale tones across the fretboard','🎼 SCALES'],builder:['Sheet Builder','Arrange your saved chords into your own progression','🎵 SHEET BUILDER'],practice:['Practice Log','Track drills, check them off, and build your streak','✅ PRACTICE LOG'],lesson:['Lesson Log','Log what you learned and turn homework into practice','🎓 LESSON LOG']}:{home:['홈','다시 만나서 반가워요. 오늘도 한 곡 연습해볼까요?','🏠 OVERVIEW'],dictionary:['코드 사전','키와 루트별로 코드 다이어그램을 찾고, 듣고, 모아보세요','📖 CHORD LIBRARY'],scales:['스케일','지판 위에서 스케일 구성음을 익혀보세요','🎼 SCALES'],builder:['악보 만들기','담은 코드를 마디에 배치해 나만의 코드 진행을 만드세요','🎵 SHEET BUILDER'],practice:['연습 기록','연습할 것을 적고 한 번씩 체크하며, 잔디로 꾸준함을 쌓으세요','✅ PRACTICE LOG'],lesson:['레슨 기록','선생님께 배운 내용과 숙제를 기록하고 연습으로 이어가세요','🎓 LESSON LOG']};

    const homeLayoutDefs=[['focus',this.L('포커스','Focus')],['board',this.L('대시보드','Board')],['minimal',this.L('미니멀','Minimal')]];
    const curLayout=s.homeLayout||this.props.homeLayout||'focus';

    return {
      navItems, weekCount:st.week, streak:st.streak, accent:C.accent,
      thisWeekLabel:this.L('이번 주 · THIS WEEK','THIS WEEK'),
      weekMeta:this.L('회 · '+st.streak+'일 연속', (st.week===1?'session':'sessions')+' · '+st.streak+'-day streak'),
      streakChip:this.L(st.streak+'일 연속', st.streak+'-day streak'),
      headerLogBtn:this.L('오늘 연습 기록','Log practice'),
      searchPlaceholder:this.L('코드 검색 (예: Am7, F)','Search chords (e.g. Am7, F)'),
      langKo:{onClick:()=>this.setLang('ko'),style:this.langBtnStyle(this.lang()==='ko')},
      langEn:{onClick:()=>this.setLang('en'),style:this.langBtnStyle(this.lang()==='en')},
      primaryBtnStyle:{padding:'9px 18px',fontSize:15,fontWeight:480,letterSpacing:'-0.1px',border:'none',borderRadius:50,background:C.ink,color:'#fff',cursor:'pointer',whiteSpace:'nowrap'},
      logPractice:()=>this.logPractice(),
      viewTitle:titles[s.view][0], viewSubtitle:titles[s.view][1], viewEyebrow:titles[s.view][2],
      isHome:s.view==='home', isDict:s.view==='dictionary', isScales:s.view==='scales', isBuilder:s.view==='builder', isPractice:s.view==='practice', isLesson:s.view==='lesson',
      homeLayouts:homeLayoutDefs.map(([k,l])=>({label:l,onClick:()=>this.setState({homeLayout:k}),style:this.seg(curLayout===k)})),
      homeView:this.homeView(),
      dictModes:[['key',this.L('키별 코드','By key')],['root',this.L('루트별 코드','By root')]].map(([k,l])=>({label:l,onClick:()=>this.setState({dictMode:k}),style:this.seg(s.dictMode===k)})),
      isKeyMode:s.dictMode==='key',
      keyTypeTabs:[['major','Major'],['minor','Minor']].map(([k,l])=>({label:l,onClick:()=>this.setState({keyType:k}),style:this.seg(s.keyType===k)})),
      query:s.query, onSearch:e=>this.setState({query:e.target.value}),
      rootButtons:this.NOTE.map((n,i)=>({name:n,onClick:()=>this.setState({selectedRoot:i}),style:this.pill(s.selectedRoot===i)})),
      chordGrid:this.chordGrid(),
      scaleTabs:Object.keys(this.scaleLabels).map(k=>({label:this.scaleLabel(k),onClick:()=>this.setState({scaleType:k}),style:this.seg(s.scaleType===k)})),
      scaleView:this.scaleView(),
      builderView:this.builderView(),
      practiceView:this.practiceView(),
      lessonView:this.lessonsView(),
      isDetail:!!s.detailChord, detailView:this.detailView(),
      toast:s.toast
    };
  }
}
</script>
