name: Deploy Pages

# main 갱신 시 정적 웹앱을 GitHub Pages(프로젝트 페이지)로 배포한다.
# Supabase env를 주입하지 않으므로 배포본은 local-mode(로그인 없이 seed 데이터로 동작).
on:
  push:
    branches: [main]
  workflow_dispatch:

# Pages 배포에 필요한 최소 권한.
permissions:
  contents: read
  pages: write
  id-token: write

# 동시 배포 방지(진행 중이면 취소하지 않고 큐잉 — 배포 유실 방지).
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build (Pages · local-mode)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Configure Pages
        uses: actions/configure-pages@v5

      # BASE_PATH만 주입 → vite base=/guitar-chordex/. Supabase env 미주입 → local-mode.
      - name: Build web app (subpath base, no backend env)
        run: npm run build
        env:
          BASE_PATH: /guitar-chordex/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    name: Deploy
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
