name: Claude PR Review

# SAFE trigger: plain `pull_request` (NOT `pull_request_target`).
# `pull_request` from a fork runs read-only with NO secret access, so the
# fork's code can never exfiltrate ANTHROPIC_API_KEY. For an in-repo private
# repo all PRs come from trusted branches anyway.
on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, ready_for_review, reopened]

# Least-privilege for an ADVISORY (comment-only) review job:
#   contents: read       -> check out the diff
#   pull-requests: write -> post inline + summary review comments
# No `issues: write` and no `id-token: write` (id-token only for OIDC/Bedrock/Vertex).
permissions:
  contents: read
  pull-requests: write

# Don't pile up reviews: cancel the prior review when a new commit lands.
concurrency:
  group: claude-review-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  claude-review:
    name: Claude Code Review
    runs-on: ubuntu-latest
    # Skip drafts; review once a PR is ready (the ready_for_review type re-runs it).
    if: github.event.pull_request.draft == false
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          # SECURITY: do NOT pass `ref:` here. Staying on the base ref keeps
          # untrusted fork code out of the workspace root while secrets are in
          # scope. Never check out an untrusted head into the workspace root.

      - name: Claude PR Review
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          # ADVISORY (comment-only): supplying `prompt` and OMITTING
          # `track_progress` keeps the action in automation mode (auto-detected).
          # It reviews immediately on the pull_request event with no @claude
          # mention, posts via the whitelisted gh commands, and passes
          # --allowedTools through unchanged. We do NOT set track_progress:true
          # because that forces "tag mode", which injects unrestricted
          # file-write/git tools that contradict this job's read-only intent.
          prompt: |
            너는 guitar-chordex (기타 코드 웹앱, TypeScript + React) 저장소의
            코드 리뷰어다. 이번 PR의 diff만 검토하라. (Review ONLY this PR's diff.)

            다음 항목을 우선순위로 점검한다 / Check, in priority order:

            1. 정확성 / Correctness: 실제 버그, 로직 오류, 경계 조건, null/undefined,
               타입 안전성 위반, 깨진 데이터 계약(생산자-소비자 경계면 불일치).
            2. 보안 / Security: 코드/로그에 시크릿이나 API 키가 노출되지 않는지,
               .env 또는 자격증명이 커밋되지 않았는지, (Supabase 사용 시) RLS 정책이
               우회되지 않는지. 시크릿 값은 절대 출력하지 마라.
            3. 도메인 순수성 / Domain purity (가장 중요): UI 컴포넌트(.tsx)에
               코드/보이싱/스케일 계산 로직을 절대 인라인하지 마라. 그 로직은
               반드시 src/domain 에 위치해야 한다. UI는 도메인 결과를 소비만 한다.
               UI 안에 도메인 로직이 박혀 있으면 지적하라.
            4. CLAUDE.md 규칙 준수 / Adherence to repo conventions in CLAUDE.md.
            5. 재사용/단순화 / Reuse & simplification: 중복 로직, 기존 도메인
               유틸로 대체 가능한 코드, 불필요한 복잡도.

            출력 규칙 / Output rules:
            - 간결하게. 실제 문제만 지적하라. (Be concise; flag ONLY real issues.)
            - 사소한 스타일/취향 코멘트는 생략한다. 문제가 없으면 그렇게 말하라.
            - 구체적인 라인에는 인라인 코멘트를, 마지막에 간단한 요약 코멘트를 남겨라.
            - 칭찬·요약 나열로 지면을 채우지 마라.
          claude_args: |
            --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*)"
            --max-turns 15
