name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Least-privilege: this job only reads the repo to build/test. No write scopes.
permissions:
  contents: read

# Cancel superseded runs on the same ref (e.g. a new push to an open PR).
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build & Test (web)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          # Pin cache keying to the ROOT lock file only. This repo carries
          # Capacitor (android/ios) deps; if native folders later gain their
          # own package-lock.json, the default **/package-lock.json wildcard
          # could pull them in. CI builds strictly the web app.
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build web app
        run: npm run build

      - name: Run tests
        run: npm test
